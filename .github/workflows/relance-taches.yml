name: Digest hebdomadaire des tâches

on:
  schedule:
    # Lundi 8h UTC = 10h Paris en été
    - cron: '0 8 * * 1'
    # Lundi 9h UTC = 10h Paris en hiver
    - cron: '0 9 * * 1'
  workflow_dispatch: # Déclenchement manuel depuis GitHub

jobs:
  relance-taches:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier qu'il est bien 10h à Paris
        id: check_time
        run: |
          PARIS_HOUR=$(TZ='Europe/Paris' date +%H)
          echo "Heure à Paris: ${PARIS_HOUR}h"
          if [ "$PARIS_HOUR" = "10" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "Ce n'est pas 10h à Paris, on skip"
          fi

      - name: Envoyer le digest des tâches
        if: steps.check_time.outputs.should_run == 'true'
        run: |
          curl -X POST "https://calendrier-zerah.vercel.app/api/relance-taches" \
            -H "Content-Type: application/json" \
            -d '{}'
